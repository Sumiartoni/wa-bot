version: '3.8'

services:
  wabot:
    build: .
    container_name: wabot
    restart: unless-stopped
    env_file: .env
    volumes:
      - wabot-data:/app/data
    ports:
      - "3000:3000"
    networks:
      - wabot-net

  nginx:
    image: nginx:alpine
    container_name: wabot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - wabot
    networks:
      - wabot-net

volumes:
  wabot-data:

networks:
  wabot-net:
